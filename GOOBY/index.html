<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Gooby</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Ctext%20x='0'%20y='13'%20font-size='13'%3E%F0%9F%90%B0%3C/text%3E%3C/svg%3E" />
    <style>
      /* V3/G33 (§B9): safe-area insets as root vars — the dev-panel fake-notch
         toggle / ?notch=1 override them inline on <html> (59/34px, §C1.4). */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff6ec;
        color: #4a3b36;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #scene {
        position: fixed;
        inset: 0; /* V3/G33 §B9: full-bleed backdrop — extends UNDER the insets */
        width: 100%;
        height: 100%;
        display: block;
      }
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none; /* screens re-enable pointer-events on their own elements */
        /* V3/G33 (§B9): in-flow UI content respects the insets; the fixed
           chrome (HUD/nav/sheets) carries its own max(gap, var(--safe-*)). */
        padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      }
    </style>
    <script>
      // V3/G33 (§B3): apply the persisted uiScale BEFORE first paint — no
      // flash of the wrong scale. main.js's initUiScale re-applies + follows
      // the store live; save schema may not carry uiScale yet (defensive).
      try {
        var s = JSON.parse(localStorage.getItem('gooby.save') || '{}');
        var sc = [85, 100, 115, 130].indexOf(Number(s && s.settings && s.settings.uiScale)) >= 0 ? Number(s.settings.uiScale) : 100;
        document.documentElement.style.fontSize = (16 * sc) / 100 + 'px';
        document.documentElement.dataset.uiScale = String(sc);
      } catch (e) { /* fresh boot / private mode: 100% default */ }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
