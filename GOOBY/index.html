<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Gooby</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Ctext%20x='0'%20y='13'%20font-size='13'%3E%F0%9F%90%B0%3C/text%3E%3C/svg%3E" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff6ec;
        color: #4a3b36;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none; /* screens re-enable pointer-events on their own elements */
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
